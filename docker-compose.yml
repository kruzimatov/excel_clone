services:
  postgres:
    image: postgres:16-alpine
    container_name: excel-clone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: excel_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d excel_clone"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: backend
    restart: unless-stopped
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/excel_clone
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://backend:4000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  web_node_modules:
